<html lang="en">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f1e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13110d" media="(prefers-color-scheme: dark)" />

    <title>Ashfaque Rifaye — AI Product Manager & Technical BA</title>
    <meta
      name="description"
      content="Ashfaque Rifaye — AI Technical Business Analyst & Product Manager with 9+ years delivering GenAI virtual assistants, conversational AI, and enterprise automation. Projects, experience, and an AI twin you can chat with."
    />
    <meta name="author" content="Ashfaque Rifaye" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />

      property="og:description"
      content="9+ years building intelligent products — GenAI virtual assistants, conversational AI, and enterprise automation."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Font: Inter (original site font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- No-flash theme + palette init (must run before paint) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          // dark is the default unless the user explicitly chose light
          var dark = t !== 'light';
          if (dark) document.documentElement.classList.add('dark');
          var p = localStorage.getItem('palette') || 'teal';
          document.documentElement.setAttribute('data-palette', p);
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-palette', 'teal');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
